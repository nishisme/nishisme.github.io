<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Workflow Builder – ESM Console</title><link rel="stylesheet" href="assets/css/style.css"/></head><body><div id="app-header"></div><div class="shell"><div id="app-sidebar"></div><main class="main">
<h2>Workflow Builder</h2><p class="muted">Create stages and assign owners. (Simple linear flow for prototype)</p><div class="card"><div id="wf" class="flow"></div><div style="margin-top:12px"><button class="button" onclick="addStage()">+ Add Stage</button><button class="button primary" onclick="saveFlow()">Save Workflow</button></div></div>
<script>let stages=[{name:'New',owner:'Requester'},{name:'Manager Approval',owner:'Team Manager'},{name:'IT Provisioning',owner:'IT Support'},{name:'Done',owner:'System'}];function render(){const el=document.getElementById('wf');el.innerHTML='';stages.forEach((s,i)=>{const n=document.createElement('div');n.className='stage';n.innerHTML=`<input class='input' style='width:160px' value='${s.name}'/><select class='select'><option ${s.owner==='Requester'?'selected':''}>Requester</option><option ${s.owner==='Team Member'?'selected':''}>Team Member</option><option ${s.owner==='Team Manager'?'selected':''}>Team Manager</option><option ${s.owner==='Functional Head'?'selected':''}>Functional Head</option><option ${s.owner==='IT Support'?'selected':''}>IT Support</option><option ${s.owner==='System'?'selected':''}>System</option></select><div class='chips'><button class='button' onclick='moveStage(${i},-1)'>⬅</button><button class='button' onclick='moveStage(${i},1)'>➡</button><button class='button' onclick='removeStage(${i})'>🗑</button></div>`;el.appendChild(n);if(i<stages.length-1){const a=document.createElement('div');a.className='arrow';a.textContent='➡';el.appendChild(a);}});}function addStage(){stages.splice(stages.length-1,0,{name:'New Stage',owner:'Team Member'});render()}function moveStage(i,d){const j=i+d;if(j<0||j>=stages.length)return;const tmp=stages[i];stages[i]=stages[j];stages[j]=tmp;render()}function removeStage(i){if(stages.length<=1)return;stages.splice(i,1);render()}function saveFlow(){alert('Workflow saved (prototype)')}render()</script>
</main></div><script src="assets/js/app.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{__esm.renderChrome('workflow.html');__esm.syncRoleVisibility();__esm.renderTeamsTable&&__esm.renderTeamsTable();__esm.bindTeamEdit&&__esm.bindTeamEdit();__esm.renderMonitoring&&__esm.renderMonitoring();});</script></body></html>
