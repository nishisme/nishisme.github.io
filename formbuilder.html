<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Form Builder – ESM Console</title><link rel="stylesheet" href="assets/css/style.css"/></head><body><div id="app-header"></div><div class="shell"><div id="app-sidebar"></div><main class="main">
<h2>Ticket Form Builder</h2>
<div class="cards" style="margin-bottom:16px"><div class="card"><h3>Field Library</h3><div class="chips"><button class="button" onclick="addField('Short Text')">Short Text</button><button class="button" onclick="addField('Long Text')">Long Text</button><button class="button" onclick="addField('Select')">Select</button><button class="button" onclick="addField('Checkbox')">Checkbox</button><button class="button" onclick="addField('Date')">Date</button><button class="button" onclick="addField('Attachment')">Attachment</button></div></div><div class="card" id="formCanvas"><h3>Form Canvas</h3><p class="muted">Add fields from the library.</p><div id="fields"></div></div><div class="card"><h3>Properties</h3><div id="props">Select a field to edit its label and required flag.</div></div></div>
<div class="chips"><button class="button primary">Save Form</button><button class="button" onclick="alert('Exported (mock)')">Export JSON</button></div>
<script>let selectedId=null,counter=1;function addField(t){const id='f'+counter++;const w=document.createElement('div');w.className='card';w.style.marginTop='10px';w.dataset.id=id;w.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><strong>${t}</strong><div class="chips"><button class="button" onclick="selectField('${id}')">Edit</button><button class="button" onclick="this.closest('div.card').remove()">Delete</button></div></div><div class="form-row" style="margin-top:8px"><input class="input" placeholder="Label" value="${t} Field"/><label style="display:flex;align-items:center;gap:6px"><input type="checkbox"/> Required</label></div>`;document.getElementById('fields').appendChild(w);}function selectField(id){selectedId=id;const el=document.querySelector(`[data-id='${id}']`);if(!el)return;const label=el.querySelector('input.input').value;const req=el.querySelector("input[type='checkbox']").checked;document.getElementById('props').innerHTML=`<div class='form-row'><input id='propLabel' class='input' value='${label}'/></div><label style='display:flex;gap:6px;align-items:center'><input id='propReq' type='checkbox' ${req?'checked':''}/> Required</label><div style='margin-top:10px'><button class='button primary' onclick='applyProps()'>Apply</button></div>`}function applyProps(){if(!selectedId)return;const el=document.querySelector(`[data-id='${selectedId}']`);el.querySelector('input.input').value=document.getElementById('propLabel').value;el.querySelector("input[type='checkbox']").checked=document.getElementById('propReq').checked}</script>
</main></div><script src="assets/js/app.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{__esm.renderChrome('formbuilder.html');__esm.syncRoleVisibility();__esm.renderTeamsTable&&__esm.renderTeamsTable();__esm.bindTeamEdit&&__esm.bindTeamEdit();__esm.renderMonitoring&&__esm.renderMonitoring();});</script></body></html>
